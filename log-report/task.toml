artifacts = ["/app/out.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parse a small access log and emit three summary stats to a fixed JSON schema."
solution_explanation = "Read the log line by line, count total requests and distinct client IPs, and pick the most-requested path; write the three values to /app/report.json."
verification_explanation = "Load /app/report.json and assert total_requests == 6, unique_ips == 3, and top_path == /index.html."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
